config:
  validation: true

build:
  maxIssues: 0

comments:
  active: false

complexity:
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: false
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    active: false

formatting:
  Indentation:
    active: true
    excludes: ['**/ui/icons/**']
  MultiLineIfElse:
    active: false
  SpacingBetweenDeclarationsWithComments:
    active: false

style:
  ForbiddenComment:
    active: false
  ForbiddenImport:
    active: true
    forbiddenImports:
      - value: 'kotlin.jvm.JvmField'
        reason: 'Use explicit backing properties instead.'
      - value: 'java.util.*'
        reason: 'Use Kotlin standard library APIs instead.'
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
  SpacingAfterPackageAndImports:
    active: true
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  WildcardImport:
    active: true
    excludeImports: []

potential-bugs:
  active: true

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  MatchingDeclarationName:
    active: false

Compose:
  active: true
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: true
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ContentTrailingLambda:
    active: true
  ContentSlotReused:
    active: true
  DefaultsVisibility:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  Material2:
    active: false
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewNaming:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  RememberContentMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
